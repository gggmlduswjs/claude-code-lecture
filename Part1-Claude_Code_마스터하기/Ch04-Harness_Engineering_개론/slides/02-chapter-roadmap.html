<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Ch04 전체 로드맵 (8 클립)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1a; font-family: 'Noto Sans KR', sans-serif; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding-bottom: 50px; opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
.container { width: 1280px; padding: 44px 80px; display: flex; flex-direction: column; align-items: center; }
.title { font-size: 46px; font-weight: 900; color: #f0f6fc; text-align: center; margin-bottom: 14px; line-height: 1.3; }
.subtitle { font-size: 16px; color: #b1bac4; text-align: center; margin-bottom: 30px; }
.roadmap { width: 100%; max-width: 1180px; display: flex; align-items: center; gap: 0; position: relative; padding: 30px 0; }
.roadmap-segment { flex: 1; text-align: center; position: relative; opacity: 0; animation: cardAppear 0.5s ease forwards; }
.roadmap-segment:nth-child(1) { animation-delay: 0.05s; }
.roadmap-segment:nth-child(2) { animation-delay: 0.12s; }
.roadmap-segment:nth-child(3) { animation-delay: 0.19s; }
.roadmap-segment:nth-child(4) { animation-delay: 0.26s; }
.roadmap-segment:nth-child(5) { animation-delay: 0.33s; }
.roadmap-segment:nth-child(6) { animation-delay: 0.40s; }
.roadmap-segment:nth-child(7) { animation-delay: 0.47s; }
.roadmap-segment:nth-child(8) { animation-delay: 0.54s; }
.roadmap-dot { width: 48px; height: 48px; border-radius: 50%; background: rgba(139, 148, 158, 0.08); border: 2px solid rgba(139, 148, 158, 0.2); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; color: #b1bac4; margin: 0 auto 16px; position: relative; z-index: 2; }
.roadmap-segment.active .roadmap-dot { background: linear-gradient(135deg, #7c3aed, #38bdf8); border-color: transparent; color: #fff; box-shadow: 0 0 24px rgba(124, 58, 237, 0.5); }
.roadmap-segment:not(:last-child)::after { content: ''; position: absolute; top: 23px; left: 60%; right: -40%; height: 2px; background: rgba(139, 148, 158, 0.2); z-index: 1; }
.roadmap-label { font-size: 12px; color: #c9d1d9; font-weight: 500; line-height: 1.4; padding: 0 4px; }
.roadmap-segment.active .roadmap-label { color: #e6edf3; font-weight: 700; }
.roadmap-time { font-size: 10px; color: #b1bac4; margin-top: 4px; letter-spacing: 0.5px; }
.bottom-note { margin-top: 30px; padding: 20px 32px; background: rgba(139,148,158,0.04); border: 1px solid rgba(124, 58, 237, 0.2); border-radius: 16px; max-width: 880px; text-align: center; font-size: 15px; color: #c9d1d9; line-height: 1.6; opacity: 0; animation: cardAppear 0.6s ease 0.7s forwards; }
.bottom-note strong { background: linear-gradient(135deg, #a78bfa, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 900; }
@keyframes cardAppear { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-12px); } }
.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(124, 58, 237, 0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }
.brand-logo { position: fixed; top: 20px; right: 28px; z-index: 9998; background: rgba(255, 255, 255, 0.97); padding: 8px 16px; border-radius: 10px; box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25); display: flex; align-items: center; pointer-events: none; opacity: 0; animation: logoFadeIn 0.6s ease 0.2s forwards; }
.brand-logo img { height: 28px; width: auto; display: block; }
@keyframes logoFadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="brand-logo"><img src="fastcampus-logo.png" alt="Fast Campus"/></div>
<div class="container">
  <h1 class="title">Ch04 · 8개 클립 로드맵</h1>
  <div class="subtitle">본질 → Claude Code 5계층 → 데모 → 패턴 → 평가·안전 → 실습</div>
  <div class="roadmap">
    <div class="roadmap-segment active"><div class="roadmap-dot">1</div><div class="roadmap-label">Harness란<br/>OS 없는 CPU</div><div class="roadmap-time">12분</div></div>
    <div class="roadmap-segment"><div class="roadmap-dot">2</div><div class="roadmap-label">4축과<br/>12요소</div><div class="roadmap-time">15분</div></div>
    <div class="roadmap-segment"><div class="roadmap-dot">3</div><div class="roadmap-label">CC<br/>5계층</div><div class="roadmap-time">15분</div></div>
    <div class="roadmap-segment"><div class="roadmap-dot">4</div><div class="roadmap-label">Before/After<br/>5단계 빌드</div><div class="roadmap-time">25분</div></div>
    <div class="roadmap-segment"><div class="roadmap-dot">5</div><div class="roadmap-label">12가지<br/>실전 패턴</div><div class="roadmap-time">10분</div></div>
    <div class="roadmap-segment"><div class="roadmap-dot">6</div><div class="roadmap-label">안티패턴<br/>3가지</div><div class="roadmap-time">8분</div></div>
    <div class="roadmap-segment"><div class="roadmap-dot">7</div><div class="roadmap-label">평가와<br/>안전</div><div class="roadmap-time">13분</div></div>
    <div class="roadmap-segment"><div class="roadmap-dot">8</div><div class="roadmap-label">5계층<br/>점진 도입</div><div class="roadmap-time">18분</div></div>
  </div>
  <div class="bottom-note">한 줄 메시지: <strong>"모델 밖으로 무엇을 꺼내 구조화할까"</strong>를 결정하는 챕터입니다. 116분, 8개 클립.</div>
</div>
<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="01-intro-hook.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">02 / 24</a></div>
    <div class="nav-right"><a href="03-harness-origins.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>
<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('01-intro-hook.html');
  if (e.key === 'ArrowRight') navigateTo('03-harness-origins.html');
});
</script>
</body>
</html>
