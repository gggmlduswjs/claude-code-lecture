<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=1280">
<title>요금제 비교</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1a; font-family: 'Noto Sans KR', sans-serif; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding-bottom: 50px; opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
.container { width: 1280px; padding: 44px 80px; display: flex; flex-direction: column; align-items: center; }
.title { font-size: 48px; font-weight: 900; color: #f0f6fc; text-align: center; margin-bottom: 14px; line-height: 1.3; }
.subtitle { font-size: 16px; color: #b1bac4; margin-bottom: 36px; }

.tiers { width: 100%; max-width: 1140px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
.tier { padding: 22px 16px; background: rgba(139,148,158,0.04); border: 1px solid rgba(139,148,158,0.1); border-radius: 14px; min-height: 220px; display: flex; flex-direction: column; opacity: 0; animation: cardAppear 0.5s ease forwards; transition: transform 0.3s; text-align: center; }
.tier:nth-child(1) { animation-delay: 0.1s; }
.tier:nth-child(2) { animation-delay: 0.18s; border-color: rgba(124,58,237,0.3); }
.tier:nth-child(3) { animation-delay: 0.26s; border-top: 3px solid #38bdf8; box-shadow: 0 0 24px rgba(56,189,248,0.1); }
.tier:nth-child(4) { animation-delay: 0.34s; border-top: 3px solid #a78bfa; }
.tier:nth-child(5) { animation-delay: 0.42s; }
.tier:hover { transform: translateY(-4px); }
.tier-name { font-size: 18px; font-weight: 900; color: #e6edf3; margin-bottom: 6px; }
.tier-price { font-size: 22px; font-weight: 900; margin-bottom: 16px; background: linear-gradient(135deg, #7c3aed, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.tier:nth-child(1) .tier-price { background: none; -webkit-text-fill-color: #b1bac4; }
.tier:nth-child(5) .tier-price { background: none; -webkit-text-fill-color: #fdba74; font-size: 16px; line-height: 1.4; padding-top: 4px; }
.tier-target { font-size: 11px; color: #b1bac4; line-height: 1.5; margin-bottom: 12px; padding: 8px 10px; background: rgba(10,15,26,0.5); border-radius: 6px; flex: 1; }
.tier-badge { font-size: 10px; padding: 3px 8px; border-radius: 999px; background: rgba(139,148,158,0.1); color: #b1bac4; font-weight: 600; letter-spacing: 0.5px; align-self: center; }
.tier:nth-child(3) .tier-badge { background: rgba(56,189,248,0.15); color: #7dd3fc; }
.tier:nth-child(4) .tier-badge { background: rgba(124,58,237,0.15); color: #a78bfa; }
.tier:nth-child(5) .tier-badge { background: rgba(249,115,22,0.15); color: #fdba74; }

.warning { margin-top: 24px; padding: 14px 24px; background: rgba(249,115,22,0.06); border: 1px solid rgba(249,115,22,0.25); border-radius: 12px; max-width: 1140px; text-align: center; opacity: 0; animation: cardAppear 0.5s 0.5s ease forwards; }
.warning-text { font-size: 13px; color: #c9d1d9; }
.warning-text strong { color: #fdba74; font-weight: 700; }

@keyframes cardAppear { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-12px); } }

.brand-logo { position: fixed; top: 20px; right: 28px; z-index: 9998; background: rgba(255,255,255,0.97); padding: 8px 16px; border-radius: 10px; box-shadow: 0 4px 14px rgba(0,0,0,0.25); display: flex; align-items: center; pointer-events: none; opacity: 0; animation: logoFadeIn 0.6s ease 0.2s forwards; }
.brand-logo img { height: 28px; width: auto; display: block; }
@keyframes logoFadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10,15,26,0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(124,58,237,0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }
</style></head>
<body>
<div class="brand-logo"><img src="fastcampus-logo.png" alt="Fastcampus"/></div>
<div class="container">
  <h1 class="title">요금제 비교</h1>
  <div class="subtitle">사용 패턴에 맞춰 5분 안에 결정</div>
  <div class="tiers">
    <div class="tier">
      <div class="tier-name">Free</div>
      <div class="tier-price">$0</div>
      <div class="tier-target">며칠 만져보기 — 한도 매우 적음</div>
      <span class="tier-badge">체험</span>
    </div>
    <div class="tier">
      <div class="tier-name">Pro</div>
      <div class="tier-price">$20</div>
      <div class="tier-target">취미·학생, 매일 1~2시간</div>
      <span class="tier-badge">진입</span>
    </div>
    <div class="tier">
      <div class="tier-name">Max 5x ⭐</div>
      <div class="tier-price">$100</div>
      <div class="tier-target">풀타임 1인 개발자, 매일 4시간+</div>
      <span class="tier-badge">표준</span>
    </div>
    <div class="tier">
      <div class="tier-name">Max 20x</div>
      <div class="tier-price">$200</div>
      <div class="tier-target">헤비 유저, Sub-Agent 다용</div>
      <span class="tier-badge">파워유저</span>
    </div>
    <div class="tier">
      <div class="tier-name">API</div>
      <div class="tier-price">사용량만큼</div>
      <div class="tier-target">적고 들쭉날쭉한 사용 — Usage Limits 필수</div>
      <span class="tier-badge">종량제</span>
    </div>
  </div>
  <div class="warning">
    <div class="warning-text">⚠️ API 시작 시 <strong>console.anthropic.com → Settings → Usage Limits</strong>에서 월 한도부터 거세요.</div>
  </div>
</div>
<nav class="slide-nav"><div class="slide-nav-inner">
  <div class="nav-left"><a href="12-auto-mode-vs-accept-edits.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
  <div class="nav-center"><a href="index.html">13 / 44</a></div>
  <div class="nav-right"><a href="14-install-flow.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
</div></nav>
<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('12-auto-mode-vs-accept-edits.html');
  if (e.key === 'ArrowRight') navigateTo('14-install-flow.html');
});
</script></body></html>
