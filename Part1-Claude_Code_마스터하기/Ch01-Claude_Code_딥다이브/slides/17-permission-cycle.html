<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=1280">
<title>컨텍스트·권한 사이클</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1a; font-family: 'Noto Sans KR', sans-serif; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding-bottom: 50px; opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
.container { width: 1280px; padding: 44px 80px; display: flex; flex-direction: column; align-items: center; }
.title { font-size: 48px; font-weight: 900; color: #f0f6fc; text-align: center; margin-bottom: 14px; line-height: 1.3; }
.subtitle { font-size: 16px; color: #b1bac4; margin-bottom: 36px; }

.three-flow { width: 100%; max-width: 1140px; display: grid; grid-template-columns: 1fr auto 1fr auto 1fr; gap: 0; align-items: stretch; }
.three-flow-stage { padding: 30px 24px; background: rgba(139,148,158,0.04); border: 1px solid rgba(139,148,158,0.1); border-radius: 18px; display: flex; flex-direction: column; align-items: center; text-align: center; opacity: 0; animation: cardAppear 0.5s ease forwards; }
.three-flow-stage.s1 { animation-delay: 0.1s; border-top: 3px solid #7c3aed; }
.three-flow-stage.s2 { animation-delay: 0.3s; border-top: 3px solid #38bdf8; }
.three-flow-stage.s3 { animation-delay: 0.5s; border-top: 3px solid #34d399; }
.three-flow-arrow { display: flex; align-items: center; justify-content: center; font-size: 26px; color: rgba(139,148,158,0.4); padding: 0 6px; }
.three-flow-icon { font-size: 38px; margin-bottom: 12px; }
.three-flow-mode { font-size: 13px; color: #c9d1d9; padding: 4px 12px; border-radius: 999px; margin-bottom: 12px; font-weight: 700; letter-spacing: 0.5px; }
.three-flow-stage.s1 .three-flow-mode { background: rgba(124,58,237,0.15); color: #a78bfa; }
.three-flow-stage.s2 .three-flow-mode { background: rgba(56,189,248,0.15); color: #7dd3fc; }
.three-flow-stage.s3 .three-flow-mode { background: rgba(52,211,153,0.15); color: #6ee7b7; }
.three-flow-title { font-size: 19px; font-weight: 900; color: #e6edf3; margin-bottom: 12px; }
.three-flow-actions { font-size: 12px; color: #b1bac4; line-height: 1.7; padding: 12px 14px; background: rgba(10,15,26,0.5); border-radius: 8px; width: 100%; }
.three-flow-actions code { color: #a78bfa; }

.next-step { margin-top: 24px; padding: 14px 28px; background: rgba(139,148,158,0.04); border: 1px solid rgba(139,148,158,0.15); border-radius: 12px; max-width: 1140px; text-align: center; opacity: 0; animation: cardAppear 0.5s 0.7s ease forwards; }
.next-step-text { font-size: 14px; color: #c9d1d9; line-height: 1.6; }
.next-step-text strong { color: #a78bfa; }

@keyframes cardAppear { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-12px); } }

.brand-logo { position: fixed; top: 20px; right: 28px; z-index: 9998; background: rgba(255,255,255,0.97); padding: 8px 16px; border-radius: 10px; box-shadow: 0 4px 14px rgba(0,0,0,0.25); display: flex; align-items: center; pointer-events: none; opacity: 0; animation: logoFadeIn 0.6s ease 0.2s forwards; }
.brand-logo img { height: 28px; width: auto; display: block; }
@keyframes logoFadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10,15,26,0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(124,58,237,0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }
</style></head>
<body>
<div class="brand-logo"><img src="fastcampus-logo.png" alt="Fastcampus"/></div>
<div class="container">
  <h1 class="title">컨텍스트·권한 사이클</h1>
  <div class="subtitle">한 작업의 호흡 — 30초 셋업, 30분 사고 방지</div>
  <div class="three-flow">
    <div class="three-flow-stage s1">
      <div class="three-flow-icon">📋</div>
      <div class="three-flow-mode">⏸ Plan Mode</div>
      <div class="three-flow-title">계획</div>
      <div class="three-flow-actions">Shift+Tab → Plan<br>방향 검토 (변경 0줄)<br>잘못되면 정정</div>
    </div>
    <div class="three-flow-arrow">→</div>
    <div class="three-flow-stage s2">
      <div class="three-flow-icon">⚡</div>
      <div class="three-flow-mode">⚡ Auto Mode</div>
      <div class="three-flow-title">실행</div>
      <div class="three-flow-actions">Shift+Tab ×2 → Auto<br>본 작업 끝까지<br><code>/context</code> 모니터</div>
    </div>
    <div class="three-flow-arrow">→</div>
    <div class="three-flow-stage s3">
      <div class="three-flow-icon">✅</div>
      <div class="three-flow-mode">🟢 Default</div>
      <div class="three-flow-title">검증</div>
      <div class="three-flow-actions">Shift+Tab → Default<br><code>/rewind</code> 또는 git diff<br>커밋 또는 폐기</div>
    </div>
  </div>
  <div class="next-step">
    <div class="next-step-text">다음 작업 → 1번부터. 새 작업 = <strong>/clear</strong> 또는 <strong>/compact focus on X</strong></div>
  </div>
</div>
<nav class="slide-nav"><div class="slide-nav-inner">
  <div class="nav-left"><a href="16b-vscode-extension.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
  <div class="nav-center"><a href="index.html">17 / 44</a></div>
  <div class="nav-right"><a href="18-subagent-mechanics.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
</div></nav>
<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('16b-vscode-extension.html');
  if (e.key === 'ArrowRight') navigateTo('18-subagent-mechanics.html');
});
</script></body></html>
