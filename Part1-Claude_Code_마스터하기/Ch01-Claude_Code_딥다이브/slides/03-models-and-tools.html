<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=1280">
<title>모델 + 도구 5범주</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1a; font-family: 'Noto Sans KR', sans-serif; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding-bottom: 50px; opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
.container { width: 1280px; padding: 44px 80px; display: flex; flex-direction: column; align-items: center; }
.title { font-size: 48px; font-weight: 900; color: #f0f6fc; text-align: center; margin-bottom: 14px; line-height: 1.3; }
.subtitle { font-size: 16px; color: #b1bac4; margin-bottom: 36px; }

.models-row { display: flex; gap: 16px; margin-bottom: 32px; }
.model-pill { padding: 12px 24px; background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.3); border-radius: 999px; font-size: 14px; font-weight: 700; color: #a78bfa; }
.model-pill.sonnet { background: rgba(56,189,248,0.1); border-color: rgba(56,189,248,0.3); color: #7dd3fc; }
.model-pill.haiku { background: rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.3); color: #6ee7b7; }
.model-label { font-size: 11px; color: #b1bac4; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px; }

.grid-2x2 { width: 100%; max-width: 1080px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; gap: 20px; }
.grid-card { padding: 24px 22px; background: rgba(139,148,158,0.04); border: 1px solid rgba(139,148,158,0.1); border-radius: 16px; min-height: 150px; display: flex; flex-direction: column; opacity: 0; animation: cardAppear 0.5s ease forwards; transition: transform 0.3s, border-color 0.3s; }
.grid-card:nth-child(1) { animation-delay: 0.1s; }
.grid-card:nth-child(2) { animation-delay: 0.2s; }
.grid-card:nth-child(3) { animation-delay: 0.3s; }
.grid-card:nth-child(4) { animation-delay: 0.4s; }
.grid-card:nth-child(5) { animation-delay: 0.5s; }
.grid-card:hover { transform: translateY(-3px); border-color: rgba(56,189,248,0.4); }
.grid-card .icon { font-size: 32px; margin-bottom: 12px; }
.grid-card .title-card { font-size: 17px; font-weight: 700; color: #e6edf3; margin-bottom: 8px; }
.grid-card .desc { font-size: 13px; color: #b1bac4; line-height: 1.55; flex: 1; }
.grid-card.span-full { grid-column: span 2; }

@keyframes cardAppear { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-12px); } }

.brand-logo { position: fixed; top: 20px; right: 28px; z-index: 9998; background: rgba(255,255,255,0.97); padding: 8px 16px; border-radius: 10px; box-shadow: 0 4px 14px rgba(0,0,0,0.25); display: flex; align-items: center; pointer-events: none; opacity: 0; animation: logoFadeIn 0.6s ease 0.2s forwards; }
.brand-logo img { height: 28px; width: auto; display: block; }
@keyframes logoFadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10,15,26,0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(124,58,237,0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }
</style></head>
<body>
<div class="brand-logo"><img src="fastcampus-logo.png" alt="Fastcampus"/></div>
<div class="container">
  <h1 class="title">모델 + 도구 5범주</h1>
  <div class="subtitle">에이전트를 만드는 두 축</div>
  <div class="model-label">MODELS</div>
  <div class="models-row">
    <span class="model-pill">Opus · 복잡한 아키텍처</span>
    <span class="model-pill sonnet">Sonnet · 균형 (기본)</span>
    <span class="model-pill haiku">Haiku · 빠른 탐색</span>
  </div>
  <div class="model-label" style="margin-top: 8px;">5 TOOL CATEGORIES</div>
  <div class="grid-2x2">
    <div class="grid-card"><div class="icon">📁</div><div class="title-card">파일 작업</div><div class="desc">Read · Write · Edit · 새 파일 생성</div></div>
    <div class="grid-card"><div class="icon">🔎</div><div class="title-card">검색</div><div class="desc">Glob · Grep · 코드베이스 탐색</div></div>
    <div class="grid-card"><div class="icon">⚡</div><div class="title-card">실행</div><div class="desc">Bash · 서버 시작 · 테스트 · git</div></div>
    <div class="grid-card"><div class="icon">🌐</div><div class="title-card">웹</div><div class="desc">WebFetch · WebSearch · 문서 조회</div></div>
    <div class="grid-card"><div class="icon">🧩</div><div class="title-card">코드 인텔리전스</div><div class="desc">타입 검사 · 정의 이동 (plugin)</div></div>
  </div>
</div>
<nav class="slide-nav"><div class="slide-nav-inner">
  <div class="nav-left"><a href="02-agent-loop.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
  <div class="nav-center"><a href="index.html">03 / 44</a></div>
  <div class="nav-right"><a href="03b-claude-access.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
</div></nav>
<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('02-agent-loop.html');
  if (e.key === 'ArrowRight') navigateTo('03b-claude-access.html');
});
</script></body></html>
