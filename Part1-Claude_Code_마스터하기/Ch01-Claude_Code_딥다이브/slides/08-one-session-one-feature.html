<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=1280">
<title>한 세션 = 한 피처</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1a; font-family: 'Noto Sans KR', sans-serif; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding-bottom: 50px; opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
.container { width: 1280px; padding: 44px 80px; display: flex; flex-direction: column; align-items: center; }
.title { font-size: 48px; font-weight: 900; color: #f0f6fc; text-align: center; margin-bottom: 18px; line-height: 1.3; }
.subtitle { font-size: 18px; color: #b1bac4; margin-bottom: 44px; font-style: italic; }

.hero-cards { display: flex; gap: 28px; justify-content: center; flex-wrap: wrap; width: 100%; max-width: 1120px; }
.hero-card { flex: 1 1 320px; max-width: 360px; min-height: 260px; padding: 32px 28px; background: rgba(139,148,158,0.04); border: 1px solid rgba(139,148,158,0.1); border-radius: 18px; display: flex; flex-direction: column; align-items: center; text-align: center; opacity: 0; animation: cardAppear 0.6s ease forwards; }
.hero-card:nth-child(1) { animation-delay: 0.1s; border-top: 3px solid #ec4899; }
.hero-card:nth-child(2) { animation-delay: 0.3s; border-top: 3px solid #34d399; }
.hero-card .pill { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }
.hero-card.bad .pill { background: rgba(236,72,153,0.15); color: #f9a8d4; }
.hero-card.good .pill { background: rgba(52,211,153,0.15); color: #6ee7b7; }
.hero-card .label { font-size: 26px; font-weight: 900; color: #e6edf3; margin-bottom: 14px; line-height: 1.3; }
.hero-card .flow { font-size: 13px; font-family: 'Courier New', monospace; color: #b1bac4; line-height: 1.7; padding: 12px 16px; background: rgba(10,15,26,0.5); border-radius: 8px; width: 100%; margin-bottom: 14px; }
.hero-card .result { font-size: 14px; font-weight: 700; }
.hero-card.bad .result { color: #f9a8d4; }
.hero-card.good .result { color: #6ee7b7; }

.principle { margin-top: 36px; padding: 24px 36px; background: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(56,189,248,0.1)); border: 1px solid rgba(124,58,237,0.3); border-radius: 18px; max-width: 900px; text-align: center; opacity: 0; animation: cardAppear 0.6s 0.5s ease forwards; }
.principle-text { font-size: 22px; font-weight: 900; background: linear-gradient(135deg, #a78bfa, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.4; }

@keyframes cardAppear { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-12px); } }

.brand-logo { position: fixed; top: 20px; right: 28px; z-index: 9998; background: rgba(255,255,255,0.97); padding: 8px 16px; border-radius: 10px; box-shadow: 0 4px 14px rgba(0,0,0,0.25); display: flex; align-items: center; pointer-events: none; opacity: 0; animation: logoFadeIn 0.6s ease 0.2s forwards; }
.brand-logo img { height: 28px; width: auto; display: block; }
@keyframes logoFadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10,15,26,0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(124,58,237,0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }
</style></head>
<body>
<div class="brand-logo"><img src="fastcampus-logo.png" alt="Fastcampus"/></div>
<div class="container">
  <h1 class="title">한 세션 = 한 피처</h1>
  <div class="subtitle">신선한 컨텍스트가 부풀어진 컨텍스트보다 항상 낫다</div>
  <div class="hero-cards">
    <div class="hero-card bad">
      <span class="pill">Bad Pattern</span>
      <div class="label">한 세션, 여러 작업</div>
      <div class="flow">결제 → 알림 → 대시보드<br>→ 버그 → 리팩토링 → ...</div>
      <div class="result">컨텍스트 100% 도달<br>로트 본격화</div>
    </div>
    <div class="hero-card good">
      <span class="pill">Good Pattern</span>
      <div class="label">세션마다 한 피처</div>
      <div class="flow">결제 → /clear → 알림<br>→ /clear → 대시보드 ...</div>
      <div class="result">매번 신선한 시작<br>품질 일관</div>
    </div>
  </div>
  <div class="principle">
    <div class="principle-text">5분 이상 사이드 토픽이면 새 세션.<br>TODO.md · CLAUDE.md로 작업 연속성 유지.</div>
  </div>
</div>
<nav class="slide-nav"><div class="slide-nav-inner">
  <div class="nav-left"><a href="07-context-rot.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
  <div class="nav-center"><a href="index.html">08 / 44</a></div>
  <div class="nav-right"><a href="09-memory-three-layers.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
</div></nav>
<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('07-context-rot.html');
  if (e.key === 'ArrowRight') navigateTo('09-memory-three-layers.html');
});
</script></body></html>
