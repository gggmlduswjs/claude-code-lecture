<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Vibe Coding의 근본 한계</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0f1a;
  font-family: 'Noto Sans KR', sans-serif;
  color: #e6edf3;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding-bottom: 50px;
}
.container {
  width: 1280px;
  padding: 44px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.title {
  font-size: 44px;
  font-weight: 900;
  color: #f0f6fc;
  text-align: center;
  margin-bottom: 12px;
  line-height: 1.3;
}
.subtitle {
  font-size: 16px;
  color: #b1bac4;
  margin-bottom: 36px;
  text-align: center;
}

.headline-quote {
  width: 100%;
  max-width: 1080px;
  padding: 36px 44px;
  background: linear-gradient(135deg, rgba(251, 191, 36, 0.06), rgba(124, 58, 237, 0.06));
  border: 1px solid rgba(251, 191, 36, 0.3);
  border-radius: 18px;
  text-align: center;
  margin-bottom: 32px;
  opacity: 0;
  animation: cardAppear 0.6s ease forwards;
  animation-delay: 0.1s;
  position: relative;
}
.headline-label {
  font-size: 12px;
  letter-spacing: 1.5px;
  font-weight: 700;
  color: #fde68a;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.headline-text {
  font-size: 28px;
  font-weight: 900;
  background: linear-gradient(135deg, #fde68a, #fbbf24);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.4;
}

.problems-grid {
  width: 100%;
  max-width: 1080px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.problem-card {
  padding: 22px 26px;
  background: rgba(139, 148, 158, 0.04);
  border: 1px solid rgba(139, 148, 158, 0.1);
  border-radius: 14px;
  display: flex;
  gap: 16px;
  opacity: 0;
  animation: cardAppear 0.5s ease forwards;
  border-left: 3px solid #fbbf24;
}
.problem-card:nth-child(1) { animation-delay: 0.25s; }
.problem-card:nth-child(2) { animation-delay: 0.35s; }
.problem-card:nth-child(3) { animation-delay: 0.45s; }
.problem-card:nth-child(4) { animation-delay: 0.55s; }
.problem-num {
  flex: 0 0 36px;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: rgba(251, 191, 36, 0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 14px;
  color: #fde68a;
}
.problem-text {
  font-size: 14px;
  color: #c9d1d9;
  line-height: 1.6;
  flex: 1;
}

.system-statement {
  width: 100%;
  max-width: 1080px;
  padding: 22px 32px;
  background: rgba(124, 58, 237, 0.08);
  border: 1px solid rgba(124, 58, 237, 0.3);
  border-radius: 14px;
  opacity: 0;
  animation: cardAppear 0.5s ease forwards;
  animation-delay: 0.7s;
  display: flex;
  align-items: center;
  gap: 18px;
}
.system-icon {
  font-size: 32px;
}
.system-content {
  flex: 1;
}
.system-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1.5px;
  color: #a78bfa;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.system-text {
  font-size: 15px;
  color: #e6edf3;
  line-height: 1.5;
}
.system-text strong {
  background: linear-gradient(135deg, #a78bfa, #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 800;
}

@keyframes cardAppear {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.slide-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 50px;
  background: rgba(10, 15, 26, 0.95);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid rgba(124, 58, 237, 0.2);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.slide-nav-inner {
  width: 1280px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 60px;
}
.slide-nav a {
  text-decoration: none; font-size: 14px; font-weight: 700;
  color: #7c3aed; transition: color 0.2s;
}
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }

body { opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-12px); }
}
.brand-logo { position: fixed; top: 20px; right: 28px; z-index: 9998; background: rgba(255,255,255,0.97); padding: 8px 16px; border-radius: 10px; box-shadow: 0 4px 14px rgba(0,0,0,0.25); display: flex; align-items: center; pointer-events: none; }
.brand-logo img { height: 28px; width: auto; display: block; }
</style>
</head>
<body>
<div class="brand-logo"><img src="fastcampus-logo.png" alt="Fastcampus"/></div>
<div class="container">
  <h1 class="title">Vibe Coding의 근본 한계</h1>
  <div class="subtitle">한 문장으로 정리하면 — 이건 시스템 차원의 문제다</div>

  <div class="headline-quote">
    <div class="headline-label">Core Limitation</div>
    <div class="headline-text">"AI의 출력을 제어할 메커니즘이 없다"</div>
  </div>

  <div class="problems-grid">
    <div class="problem-card">
      <div class="problem-num">01</div>
      <div class="problem-text">사람은 매번 완벽한 프롬프트를 쓸 수 없다</div>
    </div>
    <div class="problem-card">
      <div class="problem-num">02</div>
      <div class="problem-text">같은 사람도 매번 다른 프롬프트를 쓴다</div>
    </div>
    <div class="problem-card">
      <div class="problem-num">03</div>
      <div class="problem-text">팀원 5명이 각자 다른 프롬프트를 쓴다</div>
    </div>
    <div class="problem-card">
      <div class="problem-num">04</div>
      <div class="problem-text">프롬프트에 빠뜨린 내용은 AI도 빠뜨린다</div>
    </div>
  </div>

  <div class="system-statement">
    <div class="system-icon">⚙️</div>
    <div class="system-content">
      <div class="system-label">결론</div>
      <div class="system-text">이건 <strong>개인의 노력으로 해결 안 되는 시스템 문제</strong>다. CI/CD가 사람의 실수를 시스템으로 막은 것처럼, AI 코딩에도 시스템적 제어가 필요하다.</div>
    </div>
  </div>
</div>

<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="14-deploy-checklist.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">15 / 20</a></div>
    <div class="nav-right"><a href="16-harness-analogies.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>

<script>
function navigateTo(url) {
  document.body.classList.add('fade-out');
  setTimeout(function() { window.location.href = url; }, 300);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('14-deploy-checklist.html');
  if (e.key === 'ArrowRight') navigateTo('16-harness-analogies.html');
});
</script>
</body>
</html>
