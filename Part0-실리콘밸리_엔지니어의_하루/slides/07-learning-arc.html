<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>학습 곡선의 설계</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1a; font-family: 'Noto Sans KR', sans-serif; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding-bottom: 50px; opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
.container { width: 1280px; padding: 44px 80px; display: flex; flex-direction: column; align-items: center; }
.title { font-size: 48px; font-weight: 900; color: #f0f6fc; text-align: center; margin-bottom: 12px; line-height: 1.3; }
.subtitle { font-size: 17px; color: #b1bac4; margin-bottom: 44px; text-align: center; }
.step-flow { width: 100%; max-width: 960px; display: flex; flex-direction: column; gap: 18px; }
.step-item { display: flex; align-items: center; gap: 24px; padding: 22px 28px; background: rgba(139, 148, 158, 0.04); border: 1px solid rgba(139, 148, 158, 0.1); border-radius: 16px; opacity: 0; transform: translateX(-20px); animation: stepIn 0.5s ease forwards; }
.step-item:nth-child(1) { animation-delay: 0.1s; }
.step-item:nth-child(2) { animation-delay: 0.25s; }
.step-item:nth-child(3) { animation-delay: 0.4s; }
.step-item:nth-child(4) { animation-delay: 0.55s; }
.step-num { flex: 0 0 56px; width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; color: #fff; }
.step-item:nth-child(1) .step-num { background: linear-gradient(135deg, #7c3aed, #a78bfa); }
.step-item:nth-child(2) .step-num { background: linear-gradient(135deg, #38bdf8, #7dd3fc); }
.step-item:nth-child(3) .step-num { background: linear-gradient(135deg, #34d399, #6ee7b7); }
.step-item:nth-child(4) .step-num { background: linear-gradient(135deg, #f97316, #fbbf24); }
.step-body { flex: 1; }
.step-label { font-size: 11px; color: #b1bac4; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
.step-title { font-size: 22px; font-weight: 900; color: #e6edf3; margin-bottom: 4px; }
.step-desc { font-size: 14px; color: #b1bac4; line-height: 1.55; }
.step-part { font-size: 12px; color: #c9d1d9; background: rgba(139, 148, 158, 0.1); padding: 4px 12px; border-radius: 999px; font-weight: 700; letter-spacing: 1px; align-self: center; }
@keyframes stepIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-12px); } }
.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(124, 58, 237, 0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }

/* ===== Brand Logo (fixed top-right) ===== */
.brand-logo {
  position: fixed;
  top: 20px;
  right: 28px;
  z-index: 9998;
  background: rgba(255, 255, 255, 0.97);
  padding: 8px 16px;
  border-radius: 10px;
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
  display: flex;
  align-items: center;
  pointer-events: none;
  opacity: 0;
  animation: logoFadeIn 0.6s ease 0.2s forwards;
}
.brand-logo img {
  height: 28px;
  width: auto;
  display: block;
}
@keyframes logoFadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="brand-logo"><img src="fastcampus-logo.png" alt="Fast Campus"/></div>
<div class="container">
  <h1 class="title">학습 곡선의 설계</h1>
  <div class="subtitle">의도적으로 단계를 밟아 올라가는 구조</div>
  <div class="step-flow">
    <div class="step-item">
      <div class="step-num">1</div>
      <div class="step-body">
        <div class="step-label">WHY</div>
        <div class="step-title">왜 AI-Native인가</div>
        <div class="step-desc">현장에서 어떻게 쓰이는지를 먼저 보여드립니다. Part 0의 역할.</div>
      </div>
      <div class="step-part">Part 0</div>
    </div>
    <div class="step-item">
      <div class="step-num">2</div>
      <div class="step-body">
        <div class="step-label">HOW</div>
        <div class="step-title">어떻게 일하는가</div>
        <div class="step-desc">도구와 방법론을 원리부터 체계적으로. "왜 이렇게 해야 하는지"까지 확실하게.</div>
      </div>
      <div class="step-part">Part 1</div>
    </div>
    <div class="step-item">
      <div class="step-num">3</div>
      <div class="step-body">
        <div class="step-label">DO</div>
        <div class="step-title">직접 해본다</div>
        <div class="step-desc">실제 프로젝트를 처음부터 끝까지 만들며, 앞에서 배운 걸 종합 적용.</div>
      </div>
      <div class="step-part">Part 2</div>
    </div>
    <div class="step-item">
      <div class="step-num">4</div>
      <div class="step-body">
        <div class="step-label">SCALE</div>
        <div class="step-title">확장한다</div>
        <div class="step-desc">개인의 생산성을 팀과 조직 차원으로 넓힙니다. 커리어 관점까지.</div>
      </div>
      <div class="step-part">Part 3</div>
    </div>
  </div>
</div>
<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="06-course-structure.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">07 / 43</a></div>
    <div class="nav-right"><a href="08-three-keywords.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>
<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('06-course-structure.html');
  if (e.key === 'ArrowRight') navigateTo('08-three-keywords.html');
});
</script>
</body>
</html>
