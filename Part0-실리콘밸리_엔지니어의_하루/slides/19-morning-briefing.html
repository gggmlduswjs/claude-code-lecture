<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>09:00 AI 브리핑</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1a; font-family: 'Noto Sans KR', sans-serif; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding-bottom: 50px; opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
.container { width: 1280px; padding: 44px 80px; display: flex; flex-direction: column; align-items: center; }
.title { font-size: 44px; font-weight: 900; color: #f0f6fc; text-align: center; margin-bottom: 12px; line-height: 1.3; }
.subtitle { font-size: 17px; color: #b1bac4; margin-bottom: 40px; text-align: center; max-width: 900px; line-height: 1.5; }
.diagram { width: 100%; max-width: 1080px; position: relative; padding: 40px 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; align-items: center; justify-items: center; }
.diagram-center { grid-column: 2; grid-row: 2; width: 200px; height: 200px; border-radius: 50%; background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(56, 189, 248, 0.15)); border: 2px solid rgba(124, 58, 237, 0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; box-shadow: 0 0 60px rgba(124, 58, 237, 0.3); position: relative; z-index: 2; }
.diagram-center .icon { font-size: 42px; margin-bottom: 6px; }
.diagram-center .label { font-size: 17px; font-weight: 900; background: linear-gradient(135deg, #a78bfa, #7dd3fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.3; }
.diagram-center .sub { font-size: 11px; color: #b1bac4; margin-top: 6px; letter-spacing: 1px; }
.diagram-node { width: 160px; padding: 18px 16px; background: rgba(139, 148, 158, 0.05); border: 1px solid rgba(139, 148, 158, 0.15); border-radius: 14px; text-align: center; opacity: 0; animation: cardAppear 0.5s ease forwards; z-index: 2; }
.diagram-node:nth-child(2) { animation-delay: 0.15s; }
.diagram-node:nth-child(3) { animation-delay: 0.25s; }
.diagram-node:nth-child(4) { animation-delay: 0.35s; }
.diagram-node:nth-child(5) { animation-delay: 0.45s; }
.diagram-node:nth-child(6) { animation-delay: 0.55s; }
.diagram-node .node-icon { font-size: 28px; margin-bottom: 8px; }
.diagram-node .node-label { font-size: 13px; font-weight: 700; color: #e6edf3; margin-bottom: 3px; }
.diagram-node .node-sub { font-size: 11px; color: #b1bac4; }
.diagram-node.pos-tl { grid-column: 1; grid-row: 1; }
.diagram-node.pos-tc { grid-column: 2; grid-row: 1; }
.diagram-node.pos-tr { grid-column: 3; grid-row: 1; }
.diagram-node.pos-ml { grid-column: 1; grid-row: 2; }
.diagram-node.pos-mr { grid-column: 3; grid-row: 2; }
.diagram-node.pos-bc { grid-column: 2; grid-row: 3; }
.output-box { margin-top: 28px; padding: 16px 24px; background: rgba(52, 211, 153, 0.08); border: 1px solid rgba(52, 211, 153, 0.25); border-radius: 12px; font-size: 14px; color: #c9d1d9; text-align: center; opacity: 0; animation: cardAppear 0.5s ease forwards; animation-delay: 0.7s; }
.output-box strong { color: #6ee7b7; font-weight: 700; }
@keyframes cardAppear { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-12px); } }
.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(124, 58, 237, 0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }

/* ===== Brand Logo (fixed top-right) ===== */
.brand-logo {
  position: fixed;
  top: 20px;
  right: 28px;
  z-index: 9998;
  background: rgba(255, 255, 255, 0.97);
  padding: 8px 16px;
  border-radius: 10px;
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
  display: flex;
  align-items: center;
  pointer-events: none;
  opacity: 0;
  animation: logoFadeIn 0.6s ease 0.2s forwards;
}
.brand-logo img {
  height: 28px;
  width: auto;
  display: block;
}
@keyframes logoFadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="brand-logo"><img src="fastcampus-logo.png" alt="Fast Campus"/></div>
<div class="container">
  <h1 class="title">09:00 · 내가 출근하기 전에 브리핑은 이미 끝나 있다</h1>
  <div class="subtitle">Cron이 Claude Code를 실행시켜 모든 소스를 훑고, 우선순위까지 정한 요약을 메신저로 전송</div>
  <div class="diagram">
    <div class="diagram-node pos-tl">
      <div class="node-icon">📅</div>
      <div class="node-label">Google Calendar</div>
      <div class="node-sub">오늘 미팅 일정</div>
    </div>
    <div class="diagram-node pos-tc">
      <div class="node-icon">🐙</div>
      <div class="node-label">GitHub</div>
      <div class="node-sub">PR · Issues · 코멘트</div>
    </div>
    <div class="diagram-node pos-tr">
      <div class="node-icon">🔧</div>
      <div class="node-label">CI/CD</div>
      <div class="node-sub">실패 로그 분석</div>
    </div>
    <div class="diagram-center">
      <div class="icon">🤖</div>
      <div class="label">Claude Code<br/>via Cron</div>
      <div class="sub">MCP</div>
    </div>
    <div class="diagram-node pos-ml">
      <div class="node-icon">📋</div>
      <div class="node-label">Linear</div>
      <div class="node-sub">이슈 트래커</div>
    </div>
    <div class="diagram-node pos-mr">
      <div class="node-icon">💬</div>
      <div class="node-label">Slack</div>
      <div class="node-sub">팀 메시지</div>
    </div>
    <div class="diagram-node pos-bc">
      <div class="node-icon">📱</div>
      <div class="node-label">메신저로 전송</div>
      <div class="node-sub">우선순위 정리된 요약</div>
    </div>
  </div>
  <div class="output-box">지하철에서 <strong>5분</strong>이면 "오늘 뭐부터 해야 하는지"가 머릿속에 정리 완료</div>
</div>
<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="18-day-overview.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">19 / 43</a></div>
    <div class="nav-right"><a href="20-briefing-example.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>
<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('18-day-overview.html');
  if (e.key === 'ArrowRight') navigateTo('20-briefing-example.html');
});
</script>
</body>
</html>
