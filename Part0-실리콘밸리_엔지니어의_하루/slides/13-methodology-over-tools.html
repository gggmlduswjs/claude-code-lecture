<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>도구보다 방법론이 중요하다</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1a; font-family: 'Noto Sans KR', sans-serif; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding-bottom: 50px; opacity: 0; animation: fadeIn 0.4s ease forwards; position: relative; overflow-x: hidden; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
body::before { content: ''; position: fixed; top: -20%; left: 50%; transform: translateX(-50%); width: 900px; height: 900px; background: radial-gradient(circle, rgba(124, 58, 237, 0.12), rgba(56, 189, 248, 0.05) 40%, transparent 70%); pointer-events: none; z-index: 0; }
.container { width: 1280px; padding: 44px 80px; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; }
.title { font-size: 52px; font-weight: 900; color: #f0f6fc; text-align: center; margin-bottom: 18px; line-height: 1.25; max-width: 1100px; }
.subtitle { font-size: 18px; color: #b1bac4; margin-bottom: 56px; text-align: center; line-height: 1.5; max-width: 900px; }
.hero-cards { display: flex; gap: 28px; justify-content: center; flex-wrap: wrap; width: 100%; max-width: 1080px; }
.hero-card { flex: 1 1 300px; max-width: 340px; min-height: 220px; padding: 32px 26px; background: rgba(139, 148, 158, 0.04); border: 1px solid rgba(139, 148, 158, 0.1); border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; opacity: 0; animation: cardAppear 0.6s ease forwards; }
.hero-card:nth-child(1) { animation-delay: 0.1s; }
.hero-card:nth-child(2) { animation-delay: 0.3s; }
.hero-card:nth-child(3) { animation-delay: 0.5s; }
.hero-card .emoji { font-size: 44px; margin-bottom: 14px; }
.hero-card .value { font-size: 20px; font-weight: 900; color: #e6edf3; margin-bottom: 12px; line-height: 1.3; }
.hero-card .desc { font-size: 14px; color: #b1bac4; line-height: 1.6; }
.hero-card .desc strong { color: #c9d1d9; font-weight: 700; }
@keyframes cardAppear { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-12px); } }
.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(124, 58, 237, 0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }

/* ===== Brand Logo (fixed top-right) ===== */
.brand-logo {
  position: fixed;
  top: 20px;
  right: 28px;
  z-index: 9998;
  background: rgba(255, 255, 255, 0.97);
  padding: 8px 16px;
  border-radius: 10px;
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
  display: flex;
  align-items: center;
  pointer-events: none;
  opacity: 0;
  animation: logoFadeIn 0.6s ease 0.2s forwards;
}
.brand-logo img {
  height: 28px;
  width: auto;
  display: block;
}
@keyframes logoFadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="brand-logo"><img src="fastcampus-logo.png" alt="Fast Campus"/></div>
<div class="container">
  <h1 class="title">도구보다<br/>방법론이 중요하다</h1>
  <div class="subtitle">Agentic · Harness Engineering은 Claude Code에만 국한되지 않습니다.<br/>이 방법론은 앞으로 나올 어떤 도구에도 그대로 적용됩니다.</div>
  <div class="hero-cards">
    <div class="hero-card">
      <div class="emoji">🤖</div>
      <div class="value">Claude Code</div>
      <div class="desc">오늘의 중심 도구. <strong>에이전틱·하네스 상위 개념을 가장 잘 실습</strong>할 수 있는 환경.</div>
    </div>
    <div class="hero-card">
      <div class="emoji">⚙️</div>
      <div class="value">Codex</div>
      <div class="desc">같은 방법론을 다른 도구에 그대로 적용 가능. <strong>병행 실습</strong>으로 개념을 확장.</div>
    </div>
    <div class="hero-card">
      <div class="emoji">🚀</div>
      <div class="value">미래의 도구</div>
      <div class="desc">도구는 계속 바뀝니다. 변하지 않는 건 <strong>계획-실행-검증의 구조</strong>입니다.</div>
    </div>
  </div>
</div>
<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="12-tool-comparison.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">13 / 43</a></div>
    <div class="nav-right"><a href="14-three-core-tools.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>
<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('12-tool-comparison.html');
  if (e.key === 'ArrowRight') navigateTo('14-three-core-tools.html');
});
</script>
</body>
</html>
